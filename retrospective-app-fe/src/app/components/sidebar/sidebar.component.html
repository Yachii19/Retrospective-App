<div class="mobile-header">
    <div class="mobile-brand">
        <img src="/assets/favicon.ico" alt="Logo">
        <span>Retrospect App</span>
    </div>
    <div class="mobile-header-right">
        <span class="mobile-username">{{ username$ | async }}</span>
        <button class="mobile-logout-btn" (click)="logout()">
            <span class="material-symbols-outlined">exit_to_app</span>
        </button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <img src="/assets/favicon.ico" alt="Logo">
        <h2>RetroFlow</h2>
    </div>

    <div class="user-info">
        <span class="material-symbols-outlined">account_circle</span>
        <p class="username">{{ username$ | async }}</p>
    </div>

    <nav class="sidebar-nav">
        <ul>
            <li [routerLink]="['/dashboard']" routerLinkActive="active" data-tooltip="Dashboard">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </li>
            <li [routerLink]="['/all-sessions']" routerLinkActive="active" data-tooltip="All Sessions">
                <span class="material-symbols-outlined">list_alt</span>
                <span>All Sessions</span>
            </li>
            <li [routerLink]="['/create-session']" routerLinkActive="active" data-tooltip="Create Session">
                <span class="material-symbols-outlined">add_2</span>
                <span>Create Session</span>
            </li>
            <li [routerLink]="['/my-contribution']" routerLinkActive="active" data-tooltip="My Contributions">
                <span class="material-symbols-outlined">workspaces</span>
                <span>My Contributions</span>
            </li>

            <!-- ✅ Admin only -->
            <li *ngIf="isAdmin" [routerLink]="['/teams']" routerLinkActive="active" data-tooltip="Teams">
                <span class="material-symbols-outlined">groups</span>
                <span>Teams</span>
            </li>

            <li [routerLink]="['/profile']" routerLinkActive="active" data-tooltip="Profile">
                <span class="material-symbols-outlined">manage_accounts</span>
                <span>Profile</span>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <button (click)="logout()" class="logout-btn">
            <span class="material-symbols-outlined">exit_to_app</span>
            <span>Logout</span>
        </button>
    </div>
</div>

<div class="forgot-modal">

  <!-- Icon -->
  <div class="forgot-modal-icon" [class.success]="isSuccess">
    <span class="material-symbols-outlined">
      {{ isSuccess ? 'mark_email_read' : 'lock_reset' }}
    </span>
  </div>

  <!-- Send link form -->
  <ng-container *ngIf="!isSuccess">
    <h2>Reset password</h2>
    <p class="forgot-subtitle">
      Enter your email and we'll send you a link to reset your password.
    </p>

    <div class="input-1">
      <label for="forgot-email">Email Address</label>
      <input
        type="email"
        id="forgot-email"
        [(ngModel)]="email"
        placeholder="Enter your email"
        (input)="errorMessage = ''"
        (keyup.enter)="submit()"
        [disabled]="isLoading"
      />
    </div>

    <div class="error-message" *ngIf="errorMessage">
      <span class="material-icons">error_outline</span>
      {{ errorMessage }}
    </div>

    <button class="submit-btn" (click)="submit()" [disabled]="isLoading || !email.trim()">
      {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
    </button>

    <p class="back-text">
      <a (click)="modalRef.close()">Back to Sign In</a>
    </p>
  </ng-container>

  <!-- Success state -->
  <ng-container *ngIf="isSuccess">
    <h2>Check your email</h2>
    <p class="forgot-subtitle">
      If <strong>{{ email }}</strong> is registered, you'll receive a reset link shortly.
      It expires in <strong>30 minutes</strong>.
    </p>
    <button class="submit-btn" (click)="modalRef.close()">Done</button>
  </ng-container>

</div>

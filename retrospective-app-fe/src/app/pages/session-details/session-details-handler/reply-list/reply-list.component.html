<div class="replies-section">
    <button class="view-replies-btn" *ngIf="replies.length > 0" (click)="toggleReplies()">
        <div class="replies-btn-inner">
            <span class="replies-line"></span>
            <span class="replies-label">
                <span class="material-icons">
                    {{ showReplies ? 'expand_less' : 'expand_more' }}
                </span>
                {{ showReplies ? 'Hide replies' : 'View ' + replies.length + (replies.length === 1 ? ' reply' : ' replies') }}
            </span>
            <span class="replies-line"></span>
        </div>
    </button>

    <div class="replies-list" *ngIf="showReplies">
        <div class="reply-item" *ngFor="let reply of replies">
            <div class="reply-avatar" [style.background]="reply.createdBy.username | avatarColor">
                {{ reply.createdBy.username.charAt(0).toUpperCase() }}
            </div>
            <div class="reply-content">
                <div class="reply-header">
                    <span class="reply-username">{{ reply.createdBy.username }}</span>
                    <span class="reply-dot">·</span>
                    <span class="reply-time">{{ reply.createdAt | timeAgo: nowTick }}</span>

                    <button 
                        class="reply-edit-btn"
                        *ngIf="reply.createdBy._id === currentUserId && !isEditingReply[reply._id]"
                        (click)="startEditingReply(reply)"
                    >
                        <span class="material-symbols-outlined">edit</span>
                    </button>
                </div>

                <p *ngIf="!isEditingReply[reply._id]">{{ reply.content }}</p>

                <div class="reply-edit-mode" *ngIf="isEditingReply[reply._id]">
                    <textarea
                        [(ngModel)]="editingReplyInput[reply._id]"
                        (input)="onEditReplyInputChange(reply._id)"
                        rows="1"
                        (keydown.enter)="updateReply(reply._id); $event.preventDefault()"
                        placeholder="Edit your reply...">
                    </textarea>
                    <div class="reply-edit-actions">
                        <button class="save-btn"
                                (click)="updateReply(reply._id)"
                                [disabled]="replySubmissionInProgress[reply._id]">
                            <span class="material-symbols-outlined">save</span>
                            {{ replySubmissionInProgress[reply._id] ? 'Saving...' : 'Save' }}
                        </button>
                        <button class="cancel-btn" (click)="cancelEditingReply(reply._id)" [disabled]="replySubmissionInProgress[reply._id]">
                            <span class="material-symbols-outlined">cancel</span>
                            Cancel
                        </button>
                    </div>
                    <div class="error-message" *ngIf="editReplyError[reply._id]">
                        <span class="material-icons">error_outline</span>
                        {{ editReplyError[reply._id] }}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="reply-input-wrapper" [class.focused]="isFocused">
        <div class="reply-avatar self" [style.background]="currentUsername | avatarColor">
            {{ currentUserInitial }}
        </div>
        <textarea
            [(ngModel)]="replyInput"
            (ngModelChange)="onInputChange()"
            (keydown.enter)="sendReply($event)"
            (focus)="isFocused = true"
            (blur)="isFocused = false"
            placeholder="Write a reply..."
            class="reply-input"
            rows="1">
        </textarea>
        <button class="reply-submit-btn" 
                [disabled]="submissionInProgress"
                (click)="sendReply()"
                [class.has-content]="(replyInput.trim().length > 0)">
            <span class="material-symbols-outlined">send</span>
        </button>
    </div>

    <!-- Error Message -->
    <div class="error-message" *ngIf="showError">
        <span class="material-icons">error_outline</span>
        {{ errorMessage }}
    </div>

</div>
